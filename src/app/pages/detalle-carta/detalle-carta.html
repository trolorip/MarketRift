<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/catalogo">
      Riftbound Market
    </a>

    <div class="ms-auto">

      <a class="btn btn-outline-light btn-sm me-2" routerLink="/catalogo">
        Catálogo
      </a>

      <a class="btn btn-warning btn-sm" routerLink="/carrito">
        Carrito
      </a>

    </div>

  </div>

</nav>

<main class="container py-5">

  <div class="alert alert-danger" *ngIf="!carta">
    No se encontró la carta solicitada.
  </div>

  <div class="row justify-content-center" *ngIf="carta">

    <div class="col-12 col-lg-10">

      <div class="card border-0 shadow-lg">

        <div class="card-body p-4">

          <div class="row align-items-center">

            <div class="col-12 col-md-5 mb-4 mb-md-0">

              <img
                [src]="carta.imagen"
                [alt]="carta.nombre"
                class="imagen-detalle">

            </div>

            <div class="col-12 col-md-7">

              <h1 class="fw-bold">
                {{ carta.nombre }}
              </h1>

              <p class="text-muted fs-5">
                {{ carta.descripcion }}
              </p>

              <p class="precio">
                ${{ carta.precio | number:'1.2-2' }}
              </p>

              <div class="alert alert-success" *ngIf="mensaje">
                {{ mensaje }}
              </div>

              <button
                class="btn btn-success btn-lg me-2"
                type="button"
                (click)="agregarAlCarrito()">
                Agregar al carrito
              </button>

              <a
                routerLink="/catalogo"
                class="btn btn-outline-dark btn-lg">
                Volver al catálogo
              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</main>
