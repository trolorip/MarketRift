<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/catalogo">
      {{ nombreTienda }}
    </a>

    <ul class="navbar-nav ms-auto">

      <li class="nav-item" *ngFor="let item of menu">

        <a class="nav-link" [routerLink]="item.ruta">
          {{ item.texto }}
        </a>

      </li>

    </ul>

  </div>

</nav>

<main class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <h1 class="mb-0">
      Mi Carrito
    </h1>

    <a routerLink="/catalogo" class="btn btn-warning fw-bold">
      Seguir comprando
    </a>

  </div>

  <div class="alert alert-success" *ngIf="mensaje">
    {{ mensaje }}
  </div>

  <div class="card shadow">

    <div class="card-body">

      <div *ngIf="carrito.length === 0" class="alert alert-info">
        Tu carrito está vacío.
      </div>

      <div *ngIf="carrito.length > 0">

        <div
          class="card mb-3"
          *ngFor="let carta of carrito; let i = index">

          <div class="card-body">

            <div class="row align-items-center">

              <div class="col-12 col-md-2 mb-3 mb-md-0">

                <img
                  [src]="carta.imagen"
                  [alt]="carta.nombre"
                  class="imagen-carrito">

              </div>

              <div class="col-12 col-md-4">

                <h5>
                  {{ carta.nombre }}
                </h5>

                <p class="text-muted mb-0">
                  Carta agregada al carrito
                </p>

              </div>

              <div class="col-12 col-md-2 mt-3 mt-md-0">

                <strong>
                  ${{ carta.precio }}
                </strong>

              </div>

              <div class="col-12 col-md-2 mt-3 mt-md-0">

                <div class="d-flex align-items-center gap-2">

                  <button
                    class="btn btn-sm btn-outline-secondary"
                    type="button"
                    (click)="disminuirCantidad(carta)">
                    -
                  </button>

                  <span class="fw-bold">
                    {{ carta.cantidad }}
                  </span>

                  <button
                    class="btn btn-sm btn-outline-secondary"
                    type="button"
                    (click)="aumentarCantidad(carta)">
                    +
                  </button>

                </div>

              </div>

              <div class="col-12 col-md-1 mt-3 mt-md-0">

                <strong>
                  ${{ carta.precio * carta.cantidad | number:'1.2-2' }}
                </strong>

              </div>

              <div class="col-12 col-md-1 mt-3 mt-md-0 text-md-end">

                <button
                  class="btn btn-sm btn-danger"
                  type="button"
                  (click)="eliminarCarta(i)">
                  X
                </button>

              </div>

            </div>

          </div>

        </div>

      </div>

      <hr>

      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">

        <div>

          <span class="total">
            ${{ total | number:'1.2-2' }}
          </span>

        </div>

        <div>

          <button
            class="btn btn-danger me-2"
            type="button"
            (click)="vaciarCarrito()"
            [disabled]="carrito.length === 0">
            Vaciar carrito
          </button>

          <button
            class="btn btn-success"
            type="button"
            (click)="finalizarCompra()"
            [disabled]="carrito.length === 0">
            Finalizar compra
          </button>

        </div>

      </div>

    </div>

  </div>

</main>
