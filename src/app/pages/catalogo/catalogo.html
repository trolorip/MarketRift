<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/catalogo">
      {{ nombreTienda }}
    </a>

    <ul class="navbar-nav ms-auto">

      <li class="nav-item" *ngFor="let item of menu">

        <a class="nav-link" [routerLink]="item.ruta">
          {{ item.texto }}
        </a>

      </li>

    </ul>

  </div>

</nav>

<main class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <h1 class="mb-0">
      Catálogo de Cartas
    </h1>

    <a routerLink="/carrito" class="btn btn-warning fw-bold">
      Ver carrito
    </a>

  </div>

  <div class="alert alert-success" *ngIf="mensaje">
    {{ mensaje }}
  </div>

  <div class="row g-4">

    <div
      class="col-12 col-md-6 col-lg-4"
      *ngFor="let carta of cartas">

      <div class="card-producto">

        <img
          [src]="carta.imagen"
          [alt]="carta.nombre"
          class="imagen-carta">

        <h4 class="mt-3">
          {{ carta.nombre }}
        </h4>

        <p class="text-muted">
          {{ carta.descripcion }}
        </p>

        <p class="mb-2">

          <span
            class="badge"
            [ngClass]="carta.stock > 0 ? 'bg-success' : 'bg-danger'">
            Stock: {{ carta.stock }}
          </span>

        </p>

        <div class="precio mb-3">
          ${{ carta.precio | number:'1.2-2' }}
        </div>

        <div class="d-grid gap-2">

          <a
            class="btn btn-outline-dark"
            [routerLink]="['/detalle', carta.id]">
            Ver detalle
          </a>

          <button
            class="btn btn-success"
            type="button"
            (click)="agregarAlCarrito(carta)"
            [disabled]="carta.stock <= 0">
            {{ carta.stock > 0 ? 'Agregar al carrito' : 'Sin stock' }}
          </button>

        </div>

      </div>

    </div>

  </div>

</main>
