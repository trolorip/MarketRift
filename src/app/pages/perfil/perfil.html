<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/catalogo">
      {{ nombreTienda }}
    </a>

    <ul class="navbar-nav ms-auto">

      <li class="nav-item" *ngFor="let item of menu">

        <a class="nav-link" [routerLink]="item.ruta">
          {{ item.texto }}
        </a>

      </li>

    </ul>

  </div>

</nav>

<main class="container py-5">

  <div class="row justify-content-center">

    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow">

        <div class="card-body">

          <h1 class="h3 mb-4">
            Mi Perfil
          </h1>


          <form [formGroup]="formularioPerfil" (ngSubmit)="guardarPerfil()">

            <div class="mb-3">

              <label class="form-label">
                Nombre
              </label>

              <input
                type="text"
                class="form-control"
                formControlName="nombre"
                [class.is-invalid]="campoInvalido('nombre')">

              <div class="invalid-feedback">
                El nombre es obligatorio.
              </div>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Nickname
              </label>

              <input
                type="text"
                class="form-control"
                formControlName="usuario"
                [class.is-invalid]="campoInvalido('usuario')">

              <div class="invalid-feedback">
                El nickname es obligatorio.
              </div>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Correo
              </label>

              <input
                type="email"
                class="form-control"
                formControlName="correo"
                [class.is-invalid]="campoInvalido('correo')">

              <div class="invalid-feedback">
                Ingresa un correo válido.
              </div>

            </div>

            <button
              type="submit"
              class="btn btn-success w-100">
              Guardar cambios
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</main>
